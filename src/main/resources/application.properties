spring.application.name=${APP_NAME:demo}
server.port=${APP_PORT:8080}

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/demo_spring_angular?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.web=${LOGGING_LEVEL_WEB:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE:DEBUG}

# Jackson Configuration
spring.jackson.default-property-inclusion=${JACKSON_DEFAULT_PROPERTY_INCLUSION:non_null}
spring.jackson.serialization.indent-output=${JACKSON_INDENT_OUTPUT:true}

server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:always}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING_ERRORS:always}

# Kafka Consumer Configuration - Aiven Kafka Cloud
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:demo2_group}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}

# Kafka Consumer - JSON Deserialization Config
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=${KAFKA_DELEGATE_CLASS:org.springframework.kafka.support.serializer.JsonDeserializer}
spring.kafka.consumer.properties.spring.json.trusted.packages=${KAFKA_TRUSTED_PACKAGES:*}

# Aiven Kafka Cloud - Security Configuration (SASL_SSL)
spring.kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG;}

# Topic Configuration
spring.kafka.topic=${KAFKA_TOPIC:data-topic}
spring.kafka.properties.ssl.truststore.type=PEM
spring.kafka.properties.ssl.truststore.location=D:/HocTap/Custom/C1/demo2/ca.pem
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.ssl.endpoint.identification.algorithm=https